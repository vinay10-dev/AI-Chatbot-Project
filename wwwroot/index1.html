<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>


    <!-- Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Code highlight -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body class="h-screen flex bg-gray-100">

    <!-- Sidebar -->
    <div class="w-60 bg-white p-4 border-r">
        <h2 class="text-xl font-bold mb-6">Dashboard</h2>
        <ul class="space-y-3">
            <li class="text-gray-700 hover:text-black cursor-pointer">Home</li>
            <li class="text-gray-700 hover:text-black cursor-pointer">Messages</li>
            <li class="text-gray-700 hover:text-black cursor-pointer">Discover</li>
            <li class="text-gray-700 hover:text-black cursor-pointer">Settings</li>
        </ul>
    </div>

    <!-- Main -->
    <div class="flex-1 flex flex-col">

        <!-- Header -->
        <div class="p-4 bg-white border-b font-semibold">
            New Chat
        </div>

        <!-- Chat Area -->
        <!--<div id="chat" class="flex-1 p-6 overflow-y-auto space-y-4">-->
        <div id="chat" class="flex flex-col flex-1 p-6 overflow-y-auto space-y-4">
            <!-- Messages will appear here -->
        </div>

        <!-- Input -->
        <div class="p-4 bg-white border-t flex gap-2">
            <input id="msg"
                   class="flex-1 border rounded-xl px-4 py-2 focus:outline-none focus:ring"
                   placeholder="Ask anything..." />

            <button onclick="sendMessage()"
                    class="bg-black text-white px-4 py-2 rounded-xl">
                Send
            </button>
        </div>

    </div>
    <script>
        tailwind.config = {
            theme: {
                extend: {},
            },
            plugins: [
                tailwind.typography
            ]
        }
    </script>
    <script>
        async function sendMessage() {
            let input = document.getElementById("msg");
            let message = input.value;

            if (!message) return;

            addUserMessage(message);
            input.value = "";

            showLoader(); // ⏳ loader show

            try {
                let res = await fetch("/api/retell", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        event: "on_message",
                        data: { text: message }
                    })
                });

                let data = await res.json();

                removeLoader(); // ❌ remove loader

                await addBotMessage(data.response); // ✍️ typing effect

            } catch (err) {
                removeLoader();
                addBotMessage("❌ Error connecting to server");
            }
        }

        // ✅ USER MESSAGE UI
        function addUserMessage(message) {
            let chat = document.getElementById("chat");

            chat.innerHTML += `
               <div class="flex justify-end w-full">
    <div class="bg-black text-white px-4 py-2 rounded-2xl max-w-md break-words shadow">
        ${message}
    </div>
</div>
                `;

            chat.scrollTop = chat.scrollHeight;
        }

        // ✅ BOT MESSAGE (MARKDOWN + COPY BUTTON)
        async function addBotMessage(text) {
            let chat = document.getElementById("chat");
            let html = marked.parse(text);

            let messageDiv = document.createElement("div");
            messageDiv.className = "flex justify-start w-full";

            messageDiv.innerHTML = `
        <div class="max-w-3xl w-full px-4 py-3">

            <div class="prose prose-neutral max-w-none text-sm leading-relaxed">
                ${html}
            </div>

            <div class="mt-2 flex justify-end">
                <button onclick="copyText(this)"
                    class="text-xs text-gray-500 hover:text-black">
                    📋 Copy
                </button>
            </div>
        </div>
`;

            chat.appendChild(messageDiv);
            // Code highlight
            messageDiv.querySelectorAll("pre code").forEach((block) => {
                hljs.highlightElement(block);
            });

            chat.scrollTop = chat.scrollHeight;
        }
l

        // ✅ COPY BUTTON
        function copyText(btn) {
        let text = btn.closest("div").previousElementSibling.innerText;

            navigator.clipboard.writeText(text);

            btn.innerText = "✅ Copied";
            setTimeout(() => {
                btn.innerText = "📋 Copy";
            }, 1500);
        }
        function showLoader() {
            let chat = document.getElementById("chat");

            let loader = document.createElement("div");
            loader.id = "loader";

            loader.className = "flex justify-start";

            loader.innerHTML = `
                <div class="bg-gray-200 px-4 py-2 rounded-2xl animate-pulse">
                    Typing...
                </div>
            `;

            chat.appendChild(loader);
            chat.scrollTop = chat.scrollHeight;
        }
        function removeLoader() {
            let loader = document.getElementById("loader");
            if (loader) loader.remove();
        }

        async function typeText(element, text) {
            element.innerHTML = "";

            for (let i = 0; i < text.length; i++) {
                element.innerHTML += text[i];
                await new Promise(r => setTimeout(r, 15)); // speed control
            }
        }
    </script>

</body>
</html>
